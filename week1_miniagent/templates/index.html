<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 650px;
            height: calc(100vh - 40px);
            max-height: calc(100vh - 40px);
            min-height: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .model-select {
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .model-select:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .model-select:focus {
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .model-select option {
            background: #1a1a2e;
            color: #fff;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.3) transparent;
        }
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: messageIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message.agent {
            align-self: flex-start;
            align-items: flex-start;
        }
        .message-bubble {
            padding: 14px 18px;
            border-radius: 20px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            position: relative;
        }
        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-bottom-right-radius: 6px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .message.agent .message-bubble {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-bottom-left-radius: 6px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .message-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 6px;
            padding: 0 4px;
        }
        .message-content table {
            border-collapse: collapse;
            margin: 12px 0;
        }
        .message-content th, .message-content td {
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            text-align: left;
        }
        .message-content th {
            background: rgba(255, 255, 255, 0.1);
        }
        .message-content code {
            background: rgba(0, 0, 0, 0.2);
            padding: 3px 8px;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
        }
        .message-content pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 14px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .message-content pre code {
            background: none;
            padding: 0;
            font-size: 0.85em;
        }
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 16px 20px;
        }
        .typing-indicator span {
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        .chat-input {
            padding: 20px 24px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .chat-input input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .chat-input input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
        }
        .chat-input input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .chat-input button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .chat-input button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.5);
        }
        .chat-input button:active:not(:disabled) {
            transform: scale(0.98);
        }
        .chat-input button:disabled {
            background: rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>✨ Agent Chat</h1>
            <div style="display: flex; gap: 10px;">
                <select class="model-select" id="modelSelect">
                    <option value="deepseek">DeepSeek</option>
                </select>
                <select class="model-select" id="strategySelect">
                    <option value="react">ReAct (边想边做)</option>
                    <option value="plan_execute">Plan&Execute (先规划再执行)</option>
                </select>
            </div>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        // 生成会话ID，用于服务端关联多轮对话
        const sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

        function getTime() {
            const now = new Date();
            return now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function createTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message agent';
            div.id = 'typing';
            div.innerHTML = `
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            return div;
        }

        function addMessage(role, content, showTime = true) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + role;

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.innerHTML = marked.parse(content);

            msgDiv.appendChild(bubbleDiv);

            if (showTime && content) {
                const timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                timeDiv.textContent = getTime();
                msgDiv.appendChild(timeDiv);
            }

            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            addMessage('user', message);
            input.value = '';

            const typingDiv = createTypingIndicator();
            document.getElementById('messages').appendChild(typingDiv);
            scrollToBottom();

            try {
                const model = document.getElementById('modelSelect').value;
                const strategy = document.getElementById('strategySelect').value;
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, model: model, strategy: strategy, session_id: sessionId })
                });
                const data = await response.json();

                typingDiv.remove();

                if (data.error) {
                    addMessage('agent', '错误: ' + data.error);
                } else {
                    addMessage('agent', data.response || '无响应');
                }
            } catch (e) {
                typingDiv.remove();
                addMessage('agent', '请求失败: ' + e.message);
            }

            sendBtn.disabled = false;
            input.focus();
        }

        function scrollToBottom() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Focus input on load
        window.onload = () => {
            document.getElementById('userInput').focus();
        };
    </script>
</body>
</html>
